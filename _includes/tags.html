<!-- TAGS -->
<p class="fsize16"> Tags:
    {% if post.tags %}
        {% for tag in post.tags %}
            <a href="{{ tag.url | absolute_url }}" rel="tooltip" class="label label-default light" data-placement="right"><i class="fa fa-tags"></i> {{ tag }}</a>
        {% endfor %}
    {% else %}
        no tags
    {% endif %}
</p>
